apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "deploykubestack.fullname" . }}-controller-manager
  namespace: {{ .Values.namespace | quote }}
  labels:
    control-plane: controller-manager
    {{- include "deploykubestack.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      control-plane: controller-manager
      {{- include "deploykubestack.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      annotations:
        kubectl.kubernetes.io/restartedAt: {{ now | date "20060102150405" | quote }}
        {{- with .Values.podAnnotations }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      labels:
        control-plane: controller-manager
        {{- include "deploykubestack.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "deploykubestack.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
      - name: manager
        securityContext:
          {{- toYaml .Values.securityContext | nindent 12 }}
        image: {{ include "deploykubestack.image" . }}
        imagePullPolicy: {{ include "deploykubestack.imagePullPolicy" . }}
        command:
          - /manager
        args:
          - --leader-elect
          {{- if not .Values.leaderElection.enabled }}
          - "--leader-elect=false"
          {{- end }}
          {{- if .Values.logging.development }}
          - "--zap-devel"
          {{- end }}
          - "--zap-log-level={{ .Values.logging.level }}"
        ports:
        {{- if .Values.metricsServer.enabled }}
        - containerPort: {{ .Values.metricsServer.port }}
          name: metrics
          protocol: TCP
        {{- end }}
        {{- if .Values.healthProbe.enabled }}
        - containerPort: {{ .Values.healthProbe.port }}
          name: health
          protocol: TCP
        {{- end }}
        {{- if .Values.webhook.enabled }}
        - containerPort: {{ .Values.webhook.port }}
          name: webhook
          protocol: TCP
        {{- end }}
        env:
        - name: CONTROLLER_MANAGER_REPLICAS
          value: {{ .Values.replicaCount | quote }}
        - name: LOG_LEVEL
          value: {{ .Values.logging.level | quote }}
        {{- with .Values.env }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
        resources:
          {{- toYaml .Values.resources | nindent 12 }}
        {{- if .Values.healthProbe.enabled }}
        livenessProbe:
          httpGet:
            path: /healthz
            port: health
          initialDelaySeconds: 15
          periodSeconds: 10
          timeoutSeconds: 5
        readinessProbe:
          httpGet:
            path: /readyz
            port: health
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 5
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      terminationGracePeriodSeconds: 10
