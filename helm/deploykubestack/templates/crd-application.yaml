{{- if .Values.crds.install }}
apiVersion: apiextensions.k8s.io/v1
kind: CustomResourceDefinition
metadata:
  name: applications.{{ .Values.global.domain }}
  annotations:
    controller-gen.kubebuilder.io/version: v0.18.0
  labels:
    {{- include "deploykubestack.labels" . | nindent 4 }}
spec:
  group: apps.{{ .Values.global.domain }}
  names:
    kind: Application
    listKind: ApplicationList
    plural: applications
    singular: application
  scope: Namespaced
  versions:
  - name: v1alpha1
    served: true
    storage: true
    subresources:
      status: {}
    schema:
      openAPIV3Schema:
        description: Application is the Schema for the applications API.
        properties:
          apiVersion:
            description: APIVersion defines the versioned schema of this representation of an object.
            type: string
          kind:
            description: Kind is a string value representing the REST resource this object represents.
            type: string
          metadata:
            type: object
          spec:
            description: ApplicationSpec defines the desired state of Application.
            type: object
            required:
              - image
              - port
            properties:
              image:
                description: Image is the container image to deploy
                type: string
                minLength: 1
              port:
                description: Port is the port exposed by the service
                type: integer
                format: int32
                minimum: 1
                maximum: 65535
              replicas:
                description: Replicas is the number of pod replicas to run
                type: integer
                format: int32
                default: 1
                minimum: 1
                maximum: 1000
              resources:
                description: Resources defines CPU and memory requests/limits for the pod
                type: object
                properties:
                  requests:
                    type: object
                    additionalProperties:
                      pattern: '^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$'
                      anyOf:
                        - type: integer
                        - type: string
                  limits:
                    type: object
                    additionalProperties:
                      pattern: '^(\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))(([KMGTPE]i)|[numkMGTPE]|([eE](\+|-)?(([0-9]+(\.[0-9]*)?)|(\.[0-9]+))))?$'
                      anyOf:
                        - type: integer
                        - type: string
          status:
            description: ApplicationStatus defines the observed state of Application.
            type: object
            properties:
              phase:
                description: Phase represents the current phase of the application
                type: string
                enum:
                  - Pending
                  - Provisioning
                  - Ready
                  - Degraded
              deploymentReady:
                description: DeploymentReady indicates if the Deployment is ready
                type: boolean
              serviceReady:
                description: ServiceReady indicates if the Service is ready
                type: boolean
              message:
                description: Message provides additional information about the current state
                type: string
    additionalPrinterColumns:
    - name: Image
      type: string
      description: Container image
      jsonPath: .spec.image
    - name: Port
      type: integer
      description: Service port
      jsonPath: .spec.port
    - name: Replicas
      type: integer
      description: Number of replicas
      jsonPath: .spec.replicas
    - name: Status
      type: string
      description: Current status
      jsonPath: .status.phase
    - name: Age
      type: date
      jsonPath: .metadata.creationTimestamp
{{- end }}
