apiVersion: deploykubestack.io/v1alpha1
kind: DeployKubeStack
metadata:
  name: my-application
  namespace: default
  labels:
    app.kubernetes.io/name: my-application
    app.kubernetes.io/managed-by: deploykubestack
  annotations:
    deploykubestack.io/description: "Managed application deployment"

spec:
  # ---------------------------------------------------------------------------
  # Global / shared settings
  # ---------------------------------------------------------------------------
  global:
    environment: production          # production | staging | development
    imagePullSecrets:
      - name: registry-secret
    serviceAccountName: my-application-sa

  # ---------------------------------------------------------------------------
  # Deployment
  # ---------------------------------------------------------------------------
  deployment:
    replicas: 3
    strategy:
      type: RollingUpdate
      rollingUpdate:
        maxSurge: 1
        maxUnavailable: 0
    container:
      image: registry.example.com/my-application
      tag: "1.0.0"
      imagePullPolicy: IfNotPresent
      ports:
        - name: http
          containerPort: 8080
          protocol: TCP
        - name: metrics
          containerPort: 9090
          protocol: TCP
      resources:
        requests:
          cpu: "250m"
          memory: "256Mi"
        limits:
          cpu: "500m"
          memory: "512Mi"
      env:
        - name: APP_ENV
          value: "production"
        - name: LOG_LEVEL
          value: "info"
        - name: DB_HOST
          valueFrom:
            secretKeyRef:
              name: db-credentials
              key: host
      volumeMounts:
        - name: app-config
          mountPath: /etc/app/config
          readOnly: true
    volumes:
      - name: app-config
        configMap:
          name: my-application-config
    healthChecks:
      livenessProbe:
        httpGet:
          path: /healthz
          port: http
        initialDelaySeconds: 15
        periodSeconds: 10
        failureThreshold: 3
      readinessProbe:
        httpGet:
          path: /readyz
          port: http
        initialDelaySeconds: 5
        periodSeconds: 5
        failureThreshold: 3
    podDisruptionBudget:
      enabled: true
      minAvailable: 1
    nodeSelector: {}
    tolerations: []
    affinity: {}

  # ---------------------------------------------------------------------------
  # Service
  # ---------------------------------------------------------------------------
  service:
    enabled: true
    type: ClusterIP                  # ClusterIP | NodePort | LoadBalancer
    ports:
      - name: http
        port: 80
        targetPort: http
        protocol: TCP
      - name: metrics
        port: 9090
        targetPort: metrics
        protocol: TCP
    annotations: {}

  # ---------------------------------------------------------------------------
  # Horizontal Pod Autoscaler (HPA)
  # ---------------------------------------------------------------------------
  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 10
    behavior:
      scaleUp:
        stabilizationWindowSeconds: 60
        policies:
          - type: Pods
            value: 2
            periodSeconds: 60
      scaleDown:
        stabilizationWindowSeconds: 300
        policies:
          - type: Percent
            value: 10
            periodSeconds: 60
    metrics:
      - type: Resource
        resource:
          name: cpu
          target:
            type: Utilization
            averageUtilization: 70
      - type: Resource
        resource:
          name: memory
          target:
            type: Utilization
            averageUtilization: 80

  # ---------------------------------------------------------------------------
  # Ingress
  # ---------------------------------------------------------------------------
  ingress:
    enabled: true
    className: nginx                 # nginx | alb | traefik
    annotations:
      nginx.ingress.kubernetes.io/ssl-redirect: "true"
      nginx.ingress.kubernetes.io/proxy-body-size: "50m"
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
    rules:
      - host: my-application.example.com
        paths:
          - path: /
            pathType: Prefix
            servicePort: http
    tls:
      - secretName: my-application-tls
        hosts:
          - my-application.example.com

  # ---------------------------------------------------------------------------
  # ConfigMap
  # ---------------------------------------------------------------------------
  configMap:
    enabled: true
    name: my-application-config
    data:
      application.yaml: |
        server:
          port: 8080
        logging:
          level: info
      feature-flags.json: |
        {
          "enableNewDashboard": true,
          "enableBetaAPI": false
        }

  # ---------------------------------------------------------------------------
  # Additional optional resources
  # ---------------------------------------------------------------------------
  secret:
    enabled: false
    name: my-application-secret
    type: Opaque                     # Opaque | kubernetes.io/tls
    data: {}                         # base64-encoded key-value pairs

  serviceMonitor:
    enabled: false
    interval: 30s
    path: /metrics
    port: metrics

  networkPolicy:
    enabled: false
    ingress:
      - from:
          - namespaceSelector:
              matchLabels:
                name: ingress-nginx
        ports:
          - port: 8080
            protocol: TCP