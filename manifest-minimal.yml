# Minimal DeployKubeStack manifest — only the mandatory fields.
# Everything else (strategy, resources, probes, hpa, ingress, configMap,
# secret, serviceMonitor, networkPolicy, pdb, ...) is optional and defaulted.
# To extend, copy the relevant block from manifest-full.yml.
apiVersion: deploykubestack.io/v1alpha1
kind: DeployKubeStack
metadata:
  name: my-application
spec:
  deployment:
    container:
      image: registry.example.com/my-application
      tag: "1.0.0"
      ports:
        - name: http
          containerPort: 8080

  # A Service is the usual minimum to reach the app. Drop this block if
  # you only need the bare Deployment.
  service:
    enabled: true
    ports:
      - name: http
        port: 80
        targetPort: http
